server:
  port: 8081
  tomcat:
    max-http-form-post-size: 30MB

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  datasource:
    url: jdbc:sqlite:./data/trading_journal.db?busy_timeout=10000&journal_mode=WAL&synchronous=NORMAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
billing:
  webhook:
    secret: ${BILLING_WEBHOOK_SECRET:}
