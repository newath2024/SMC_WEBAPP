<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trade Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Trade Detail</h2>

    <div class="d-flex gap-2">
      <a class="btn btn-primary" th:href="@{/trades/{id}/edit(id=${trade.id})}">Edit</a>
      <a class="btn btn-outline-secondary" href="/trades">Back to Trades</a>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">Trade Info</h5>

      <div class="row g-3">
        <div class="col-md-3">
          <strong>Account</strong>
          <div th:text="${trade.accountLabel}"></div>
        </div>
        <div class="col-md-3">
          <strong>Symbol</strong>
          <div th:text="${trade.symbol}"></div>
        </div>
        <div class="col-md-3">
          <strong>Direction</strong>
          <div th:text="${trade.direction}"></div>
        </div>
        <div class="col-md-3">
          <strong>Setup</strong>
          <div th:text="${trade.setup != null ? trade.setup.name : '-'}"></div>
        </div>

        <div class="col-md-3">
          <strong>HTF</strong>
          <div th:text="${trade.htf}"></div>
        </div>
        <div class="col-md-3">
          <strong>LTF</strong>
          <div th:text="${trade.ltf}"></div>
        </div>
        <div class="col-md-3">
          <strong>Session</strong>
          <div th:text="${trade.session}"></div>
        </div>
        <div class="col-md-3">
          <strong>Result</strong>
          <div th:text="${trade.result}"></div>
        </div>

        <div class="col-md-3">
          <strong>Entry Price</strong>
          <div th:text="${trade.entryPrice}"></div>
        </div>
        <div class="col-md-3">
          <strong>Stop Loss</strong>
          <div th:text="${trade.stopLoss}"></div>
        </div>
        <div class="col-md-3">
          <strong>Take Profit</strong>
          <div th:text="${trade.takeProfit}"></div>
        </div>
        <div class="col-md-3">
          <strong>Exit Price</strong>
          <div th:text="${trade.exitPrice}"></div>
        </div>

        <div class="col-md-3">
          <strong>Position Size</strong>
          <div th:text="${trade.positionSize}"></div>
        </div>
        <div class="col-md-3">
          <strong>PnL</strong>
          <div th:text="${trade.pnl}"></div>
        </div>
        <div class="col-md-3">
          <strong>R Multiple</strong>
          <div th:text="${trade.rMultiple}"></div>
        </div>

        <div class="col-md-6">
          <strong>Entry Time</strong>
          <div th:text="${#temporals.format(trade.entryTime, 'yyyy-MM-dd HH:mm')}"></div>
        </div>
        <div class="col-md-6">
          <strong>Exit Time</strong>
          <div th:text="${trade.exitTime != null ? #temporals.format(trade.exitTime, 'yyyy-MM-dd HH:mm') : '-'}"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">Time Analysis</h5>

      <div class="row g-3">
        <div class="col-md-4">
          <strong>Holding Time</strong>
          <div th:text="${trade.holdingMinutes != null ? trade.holdingMinutes + ' minutes' : '-'}"></div>
        </div>
        <div class="col-md-4">
          <strong>Execution TF</strong>
          <div th:text="${trade.ltf != null ? trade.ltf : '-'}"></div>
        </div>
        <div class="col-md-4">
          <strong>Equivalent</strong>
          <div th:text="${trade.equivalentCandles != null ? '~' + trade.equivalentCandles + ' candles' : '-'}"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">Mistakes</h5>

      <div th:if="${trade.mistakes != null and !#lists.isEmpty(trade.mistakes)}">
        <span class="badge text-bg-danger me-2 mb-2"
              th:each="m : ${trade.mistakes}"
              th:text="${m.name}">
        </span>
      </div>

      <div class="text-muted" th:if="${trade.mistakes == null or #lists.isEmpty(trade.mistakes)}">
        No mistakes tagged.
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="card-title mb-3">Note</h5>
      <div th:text="${trade.note != null and !#strings.isEmpty(trade.note) ? trade.note : '-'}"></div>
    </div>
  </div>
</div>

</body>
</html>
