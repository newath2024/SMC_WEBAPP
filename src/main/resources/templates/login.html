<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/img/tradejournal-logo-mark.svg}" href="/img/tradejournal-logo-mark.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/auth.css" rel="stylesheet">
</head>
<body class="auth-page">
<div class="auth-shell">
  <div class="auth-frame container-fluid p-0">
    <div class="row g-0">
      <div class="col-lg-6 d-none d-lg-block">
        <section class="branding-pane">
          <div class="logo-badge mb-3">
            <img src="/img/tradejournal-logo-mark.svg" alt="TradeJournal logo" width="30" height="30">
          </div>
          <p class="brand-kicker">Built for disciplined traders</p>
          <h1 class="brand-title">Trade Journal</h1>
          <p class="brand-note">Your personal trading analytics workspace</p>
          <ul class="brand-points">
            <li>Track every trade</li>
            <li>Analyze performance</li>
            <li>Improve your strategy</li>
          </ul>
        </section>
      </div>

      <div class="col-lg-6">
        <section class="form-pane d-flex align-items-center h-100">
          <div class="login-card">
            <h2 class="form-title">Sign in</h2>
            <p class="form-subtitle">Track and analyze your trades</p>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" action="/login" class="d-grid gap-3">
              <div>
                <label class="form-label fw-semibold">Username or Email</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                      <path d="M14 14s-1-4-6-4-6 4-6 4 1 1 6 1 6-1 6-1z"/>
                    </svg>
                  </span>
                  <input class="form-control" type="text" name="usernameOrEmail" th:value="${usernameOrEmail}" placeholder="you@example.com" required>
                </div>
              </div>

              <div>
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M8 1a4 4 0 0 0-4 4v3H3a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-1V5a4 4 0 0 0-4-4zm3 7H5V5a3 3 0 0 1 6 0v3z"/>
                    </svg>
                  </span>
                  <input id="password" class="form-control" type="password" name="password" placeholder="Enter your password" required>
                  <button class="toggle-btn" type="button" data-target="password" aria-label="Show password">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                      <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z"/>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="d-flex align-items-center justify-content-between">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="true" id="rememberMe" name="rememberMe">
                  <label class="form-check-label text-secondary" for="rememberMe">Remember me</label>
                </div>
                <a href="/forgot-password" class="small text-decoration-none">Forgot password?</a>
              </div>

              <button class="btn btn-primary btn-lg w-100 btn-signin" type="submit">Sign in to your account</button>
            </form>

            <div class="text-center mt-4">
              <span class="text-muted">Don't have an account?</span>
              <a href="/register" class="text-decoration-none fw-semibold ms-1">Register</a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('.toggle-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var targetId = btn.getAttribute('data-target');
      var input = document.getElementById(targetId);
      if (!input) {
        return;
      }

      var isPassword = input.getAttribute('type') === 'password';
      input.setAttribute('type', isPassword ? 'text' : 'password');
      btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });
  });
</script>
</body>
</html>
