<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title th:text="${editMode} ? 'Edit Trading Setup' : 'Create Setup'">Create Setup</title>
<link rel="icon" type="image/svg+xml" th:href="@{/img/tradejournal-logo-mark.svg}" href="/img/tradejournal-logo-mark.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/sidebar-toggle.css}" href="/css/sidebar-toggle.css" rel="stylesheet">
  <link th:href="@{/css/analytics-dashboard.css}" href="/css/analytics-dashboard.css" rel="stylesheet">
  <link th:href="@{/css/app-page.css}" href="/css/app-page.css" rel="stylesheet">
  <link th:href="@{/css/setup-form.css}" href="/css/setup-form.css" rel="stylesheet">

</head>

<body class="dashboard-body app-page-body">
<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell collapsible-shell expanded">
    <aside th:replace="~{fragments/sidebar :: appSidebar('setups', @{/dashboard/export.csv(period='ALL')})}"></aside>

    
    <main class="main-content">
      <div class="setup-form-shell">
        <nav class="setup-breadcrumb" aria-label="breadcrumb">
          <a th:href="@{/setups}">Setups</a>
          <span class="setup-breadcrumb-sep">/</span>
          <span th:text="${editMode} ? 'Edit Setup' : 'Create Setup'">Edit Setup</span>
        </nav>

        <header class="setup-form-header">
          <h2 th:text="${editMode} ? 'Edit Trading Setup' : 'Create Trading Setup'">Edit Trading Setup</h2>
          <p th:text="${editMode} ? 'Update your strategy details and description.' : 'Create a setup template for your future trades.'">
            Update your strategy details and description.
          </p>
        </header>

        <section class="setup-form-card">
          <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>

          <form th:action="${editMode} ? '/setups/' + setup.id + '/edit' : '/setups'" th:object="${setup}" method="post">
            <div class="setup-form-group">
              <label class="form-label setup-form-label">Setup Name</label>
              <input type="text"
                     class="form-control"
                     th:field="*{name}"
                     required>
            </div>

            <div class="setup-form-group">
              <label class="form-label setup-form-label">Description</label>
              <textarea class="form-control"
                        th:field="*{description}"
                        rows="5"></textarea>
            </div>

            <div class="setup-form-group" th:if="${editMode}">
              <label class="form-label setup-form-label">Status</label>
              <div class="setup-status-options">
                <label class="setup-status-option">
                  <input type="radio" name="active" value="true" th:checked="${setup.active}">
                  <span>Active</span>
                </label>
                <label class="setup-status-option">
                  <input type="radio" name="active" value="false" th:checked="${!setup.active}">
                  <span>Archived</span>
                </label>
              </div>
            </div>

            <div class="setup-form-actions">
              <button class="btn btn-primary" type="submit" th:text="${editMode} ? 'Save Changes' : 'Save Setup'">Save Changes</button>
              <a class="btn btn-outline-secondary" th:href="@{/setups}">Cancel</a>
            </div>
          </form>
        </section>
      </div>
    </main>
  </div>
</div>

  <script th:src="@{/js/sidebar-toggle.js}" src="/js/sidebar-toggle.js"></script>

</body>
</html>
