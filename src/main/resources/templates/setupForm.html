<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Create Setup</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
  .app-shell {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .sidebar {
    width: 220px;
    position: sticky;
    top: 16px;
  }
  .main-content {
    flex: 1;
    min-width: 0;
  }
  @media (max-width: 991.98px) {
    .app-shell {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      position: static;
    }
  }
</style>

</head>

<body class="bg-light">
<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="fw-semibold mb-3">Navigation</div>
          <div class="d-grid gap-2">
            <a th:href="@{/analytics}" class="btn btn-outline-primary">Analytics</a>
            <a th:href="@{/trades}" class="btn btn-outline-primary">Trades</a>
            <a th:href="@{/setups}" class="btn btn-primary">Setups</a>
            <a th:href="@{/mistakes}" class="btn btn-outline-secondary">Mistakes</a>
            <form method="post" action="/logout">
              <button class="btn btn-outline-danger w-100" type="submit">Logout</button>
            </form>
          </div>
          <div class="text-muted small mt-3" th:if="${currentUser != null}">
            Logged in as <strong th:text="${currentUser.username}"></strong>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">

<h2>Create Setup</h2>

<form th:action="@{/setups}" th:object="${setup}" method="post">

<div class="mb-3">
<label class="form-label">Setup Name</label>
<input type="text"
       class="form-control"
       th:field="*{name}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea class="form-control"
          th:field="*{description}"
          rows="3">
</textarea>
</div>

<button class="btn btn-primary">
Save Setup
</button>

<a class="btn btn-secondary"
   th:href="@{/setups}">
Cancel
</a>

</form>
    </main>
  </div>
</div>

</body>
</html>
