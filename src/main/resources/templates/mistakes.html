<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mistake Tags</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .app-shell {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .sidebar {
      width: 220px;
      position: sticky;
      top: 16px;
    }
    .main-content {
      flex: 1;
      min-width: 0;
    }
    @media (max-width: 991.98px) {
      .app-shell {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        position: static;
      }
    }
  </style>
</head>
<body class="bg-light">

<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="fw-semibold mb-3">Navigation</div>
          <div class="d-grid gap-2">
            <a th:href="@{/analytics}" class="btn btn-outline-primary">Analytics</a>
            <a th:href="@{/trades}" class="btn btn-outline-primary">Trades</a>
            <a th:href="@{/setups}" class="btn btn-outline-secondary">Setups</a>
            <a th:href="@{/mistakes}" class="btn btn-primary">Mistakes</a>
            <form method="post" action="/logout">
              <button class="btn btn-outline-danger w-100" type="submit">Logout</button>
            </form>
          </div>
          <div class="text-muted small mt-3" th:if="${currentUser != null}">
            Logged in as <strong th:text="${currentUser.username}"></strong>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Mistake Tags</h2>
    <a class="btn btn-primary" href="/mistakes/new">+ New Mistake</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
          <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="m : ${mistakes}">
            <td th:text="${m.code}"></td>
            <td th:text="${m.name}"></td>
            <td th:text="${m.description != null && !#strings.isEmpty(m.description) ? m.description : '-'}"></td>
            <td>
              <span class="badge text-bg-success" th:if="${m.active}">ACTIVE</span>
              <span class="badge text-bg-secondary" th:if="${!m.active}">INACTIVE</span>
            </td>
            <td>
              <div class="d-flex gap-2">
                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{/mistakes/{id}/edit(id=${m.id})}">
                  Edit
                </a>

                <form th:action="@{/mistakes/{id}/toggle-active(id=${m.id})}" method="post">
                  <button class="btn btn-sm btn-warning"
                          type="submit"
                          th:text="${m.active} ? 'Disable' : 'Enable'">
                    Toggle
                  </button>
                </form>

                <form th:action="@{/mistakes/{id}/delete(id=${m.id})}"
                      method="post"
                      onsubmit="return confirm('Delete this mistake tag? This also removes it from existing trades.');">
                  <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(mistakes)}">
            <td colspan="5" class="text-center text-muted">No mistake tags found.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
    </main>
  </div>
</div>

</body>
</html>
