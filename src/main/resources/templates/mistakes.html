<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mistake Tags</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="m-0">Mistake Tags</h2>
      <div class="text-muted">
        Logged in as <strong th:text="${currentUser.username}"></strong>
      </div>
    </div>

    <div class="d-flex gap-2">
      <a class="btn btn-primary" href="/mistakes/new">+ New Mistake</a>
      <a class="btn btn-outline-secondary" href="/trades">Back to Trades</a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
          <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="m : ${mistakes}">
            <td th:text="${m.code}"></td>
            <td th:text="${m.name}"></td>
            <td th:text="${m.description != null && !#strings.isEmpty(m.description) ? m.description : '-'}"></td>
            <td>
              <span class="badge text-bg-success" th:if="${m.active}">ACTIVE</span>
              <span class="badge text-bg-secondary" th:if="${!m.active}">INACTIVE</span>
            </td>
            <td>
              <div class="d-flex gap-2">
                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{/mistakes/{id}/edit(id=${m.id})}">
                  Edit
                </a>

                <form th:action="@{/mistakes/{id}/toggle-active(id=${m.id})}" method="post">
                  <button class="btn btn-sm btn-warning"
                          type="submit"
                          th:text="${m.active} ? 'Disable' : 'Enable'">
                    Toggle
                  </button>
                </form>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(mistakes)}">
            <td colspan="5" class="text-center text-muted">No mistake tags found.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
