<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --brand-primary: #0d6efd;
      --brand-accent: #38bdf8;
      --panel-bg: rgba(255, 255, 255, 0.88);
      --text-muted-soft: #6c757d;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 15% 20%, #dbeafe 0%, transparent 42%),
                  radial-gradient(circle at 85% 30%, #cffafe 0%, transparent 40%),
                  linear-gradient(140deg, #f8fafc 0%, #eef2ff 50%, #f0f9ff 100%);
    }

    .auth-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-frame {
      width: 100%;
      max-width: 1080px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 1.25rem;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(6px);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.15);
    }

    .branding-pane {
      background: linear-gradient(155deg, #0f172a 0%, #1e293b 55%, #0ea5e9 140%);
      color: #f8fafc;
      padding: 3.25rem 2.25rem;
      height: 100%;
    }

    .logo-badge {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .brand-kicker {
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .76rem;
      font-weight: 600;
      color: rgba(248, 250, 252, 0.75);
      margin-top: 1rem;
    }

    .brand-title {
      font-size: clamp(1.75rem, 2vw, 2.15rem);
      line-height: 1.25;
      margin: .85rem 0 1rem;
      font-weight: 700;
    }

    .brand-copy {
      color: rgba(248, 250, 252, 0.82);
      max-width: 36ch;
      line-height: 1.55;
    }

    .form-pane {
      background: var(--panel-bg);
      padding: 2rem 1.5rem;
    }

    .register-card {
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 1rem;
      background: #fff;
      box-shadow: 0 10px 35px rgba(15, 23, 42, 0.08);
      padding: 2rem;
      max-width: 520px;
      margin: 0 auto;
    }

    .form-title {
      font-weight: 700;
      font-size: 1.75rem;
      margin-bottom: .4rem;
      color: #0f172a;
    }

    .form-subtitle {
      color: var(--text-muted-soft);
      margin-bottom: 1.5rem;
    }

    .input-wrap {
      position: relative;
    }

    .field-icon {
      position: absolute;
      left: .95rem;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      pointer-events: none;
      z-index: 5;
    }

    .form-control.form-control-lg.input-with-icon {
      padding-left: 2.7rem;
      min-height: 3rem;
      border-radius: .8rem;
    }

    .password-toggle {
      position: absolute;
      right: .6rem;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #64748b;
      padding: .35rem;
      z-index: 6;
    }

    .password-toggle:hover {
      color: #0f172a;
    }

    .btn-create {
      min-height: 3rem;
      border-radius: .8rem;
      font-weight: 600;
      letter-spacing: .01em;
    }

    @media (max-width: 991.98px) {
      .branding-pane {
        padding: 2rem 1.5rem;
      }

      .register-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-frame container-fluid p-0">
    <div class="row g-0">
      <div class="col-lg-6 d-none d-lg-block">
        <section class="branding-pane">
          <div class="logo-badge mb-3">
            <img src="/img/tradejournal-logo-mark.svg" alt="TradeJournal logo" width="30" height="30">
          </div>
          <p class="brand-kicker mb-0">TradeJournal</p>
          <h1 class="brand-title">Build consistency with a cleaner, smarter trading workflow.</h1>
          <p class="brand-copy mb-0">
            Capture every trade, review execution quality, and spot patterns faster with a focused journal built for disciplined traders.
          </p>
        </section>
      </div>

      <div class="col-lg-6">
        <section class="form-pane d-flex align-items-center h-100">
          <div class="register-card w-100">
            <h2 class="form-title">Create your account</h2>
            <p class="form-subtitle">Start tracking your performance in minutes.</p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" action="/register" class="d-grid gap-3">
              <div>
                <label class="form-label fw-semibold">Username</label>
                <div class="input-wrap">
                  <span class="field-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                      <path d="M14 14s-1-4-6-4-6 4-6 4 1 1 6 1 6-1 6-1z"/>
                    </svg>
                  </span>
                  <input class="form-control form-control-lg input-with-icon" type="text" name="username" th:value="${username}" placeholder="Choose a username" required>
                </div>
              </div>

              <div>
                <label class="form-label fw-semibold">Email</label>
                <div class="input-wrap">
                  <span class="field-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-.5a.5.5 0 0 0-.354.146L8 8.293l6.354-4.647A.5.5 0 0 0 14 3.5H2zm12 1.207-4.708 3.445L14 11.793V4.707zM13.146 12.5 8.5 9.106l-.5.367-.5-.367L2.854 12.5h10.292zM2 11.793l4.708-3.641L2 4.707v7.086z"/>
                    </svg>
                  </span>
                  <input class="form-control form-control-lg input-with-icon" type="email" name="email" th:value="${email}" placeholder="you@company.com" required>
                </div>
              </div>

              <div>
                <label class="form-label fw-semibold">Password</label>
                <div class="input-wrap">
                  <span class="field-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M8 1a4 4 0 0 0-4 4v3H3a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-1V5a4 4 0 0 0-4-4zm3 7H5V5a3 3 0 0 1 6 0v3z"/>
                    </svg>
                  </span>
                  <input id="password" class="form-control form-control-lg input-with-icon" type="password" name="password" placeholder="Create a password" required>
                  <button class="password-toggle" type="button" data-target="password" aria-label="Show password">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                      <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z"/>
                    </svg>
                  </button>
                </div>
              </div>

              <div>
                <label class="form-label fw-semibold">Confirm Password</label>
                <div class="input-wrap">
                  <span class="field-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M8 1a4 4 0 0 0-4 4v3H3a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-1V5a4 4 0 0 0-4-4zm3 7H5V5a3 3 0 0 1 6 0v3z"/>
                    </svg>
                  </span>
                  <input id="confirmPassword" class="form-control form-control-lg input-with-icon" type="password" name="confirmPassword" placeholder="Re-enter your password" required>
                  <button class="password-toggle" type="button" data-target="confirmPassword" aria-label="Show password confirmation">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                      <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z"/>
                    </svg>
                  </button>
                </div>
              </div>

              <button class="btn btn-primary btn-lg w-100 btn-create" type="submit">Create Account</button>
            </form>

            <div class="text-center mt-4">
              <span class="text-muted">Already have an account?</span>
              <a href="/login" class="text-decoration-none fw-semibold ms-1">Login</a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('.password-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var targetId = btn.getAttribute('data-target');
      var input = document.getElementById(targetId);
      if (!input) {
        return;
      }

      var isPassword = input.getAttribute('type') === 'password';
      input.setAttribute('type', isPassword ? 'text' : 'password');
      btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });
  });
</script>
</body>
</html>
