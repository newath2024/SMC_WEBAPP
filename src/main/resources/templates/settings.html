<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Settings</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/img/tradejournal-logo-mark.svg}" href="/img/tradejournal-logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/sidebar-toggle.css}" href="/css/sidebar-toggle.css" rel="stylesheet">
  <link th:href="@{/css/analytics-dashboard.css}" href="/css/analytics-dashboard.css" rel="stylesheet">
  <link th:href="@{/css/app-page.css}" href="/css/app-page.css" rel="stylesheet">
  <link th:href="@{/css/settings-page.css}" href="/css/settings-page.css" rel="stylesheet">
</head>
<body class="app-page-body settings-body">
<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell collapsible-shell expanded settings-shell">
    <aside th:replace="~{fragments/sidebar :: appSidebar('settings', @{/dashboard/export.csv(period='ALL')})}"></aside>

    <main class="main-content settings-main">
      <section class="settings-overview">
        <div class="settings-overview-copy">
          <span class="settings-kicker"><i class="bi bi-sliders2 me-1"></i>Account workspace</span>
          <h1 class="settings-title">Settings</h1>
          <p class="settings-copy">A tighter control surface for your account, security, journaling defaults, and notifications.</p>
        </div>
        <div class="settings-overview-meta">
          <div class="overview-stat">
            <span>Plan</span>
            <strong th:text="${settingsPlanLabel}">Pro Plan</strong>
          </div>
          <div class="overview-stat">
            <span>Member since</span>
            <strong th:text="${memberSince}">Mar 2026</strong>
          </div>
          <div class="overview-stat">
            <span>Email</span>
            <strong th:text="${currentUser.email}">user@example.com</strong>
          </div>
        </div>
      </section>

      <section class="settings-workspace" data-settings-workspace th:attr="data-initial-section=${'profile'}">
        <aside class="settings-nav-shell">
          <div class="settings-nav-label">Settings</div>
          <nav class="settings-nav" aria-label="Settings sections">
            <button class="settings-nav-item is-active" type="button" data-section-trigger="profile">
              <span class="settings-nav-icon"><i class="bi bi-person"></i></span>
              <span class="settings-nav-copy">
                <strong>Profile</strong>
                <small>Identity and exports</small>
              </span>
            </button>
            <button class="settings-nav-item" type="button" data-section-trigger="security">
              <span class="settings-nav-icon"><i class="bi bi-shield-lock"></i></span>
              <span class="settings-nav-copy">
                <strong>Security</strong>
                <small>Password and account removal</small>
              </span>
            </button>
            <button class="settings-nav-item" type="button" data-section-trigger="preferences">
              <span class="settings-nav-icon"><i class="bi bi-graph-up-arrow"></i></span>
              <span class="settings-nav-copy">
                <strong>Trading Preferences</strong>
                <small>Defaults for journaling</small>
              </span>
            </button>
            <button class="settings-nav-item" type="button" data-section-trigger="notifications">
              <span class="settings-nav-icon"><i class="bi bi-bell"></i></span>
              <span class="settings-nav-copy">
                <strong>Notifications</strong>
                <small>Email and weekly reports</small>
              </span>
            </button>
          </nav>
        </aside>

        <div class="settings-panel-shell">
          <div class="settings-feedback-stack">
            <div class="settings-global-feedback d-none" data-global-feedback></div>
            <div class="settings-savebar d-none" data-savebar>
              <div class="savebar-copy">
                <div class="settings-savebar-status-row">
                  <strong data-savebar-title>No unsaved changes</strong>
                  <span class="settings-savebar-status" data-save-status>Idle</span>
                </div>
                <span data-savebar-text>Changes appear here before saving.</span>
              </div>
              <div class="savebar-actions">
                <button class="btn btn-light rounded-pill d-none" type="button" data-cancel-edit>Cancel</button>
                <button class="btn btn-primary rounded-pill" type="button" data-save-active>
                  <span class="spinner-border spinner-border-sm d-none" aria-hidden="true" data-save-spinner></span>
                  <span data-save-label>Save changes</span>
                </button>
              </div>
            </div>
          </div>

          <div class="settings-section-mount" data-section-mount aria-live="polite"></div>
        </div>
      </section>

      <template id="settings-template-profile">
        <section class="settings-section" data-section-key="profile" data-section-title="Profile">
          <div class="settings-section-header">
            <div>
              <div class="section-eyebrow">Profile</div>
              <h2 class="section-title">Personal account details</h2>
              <p class="section-copy">Read first, edit only when needed. Export actions stay in the same workspace.</p>
            </div>
            <button class="btn btn-dark rounded-pill settings-edit-button" type="button" data-edit-toggle>
              <i class="bi bi-pencil-square"></i>
              <span>Edit profile</span>
            </button>
          </div>

          <div class="alert alert-success settings-inline-alert" data-feedback="success" th:if="${profileSuccess != null}" th:text="${profileSuccess}">Profile updated successfully.</div>
          <div class="alert alert-danger settings-inline-alert" data-feedback="error" th:if="${profileError != null}" th:text="${profileError}">Profile update failed.</div>

          <div class="settings-mode-view" data-mode="view">
            <div class="settings-card-grid">
              <article class="settings-card settings-card-primary settings-profile-card">
                <div class="settings-card-topline">
                  <span class="settings-card-kicker">Workspace identity</span>
                  <span class="settings-card-meta">Visible in exports and shared account surfaces</span>
                </div>
                <div class="settings-avatar-block">
                  <div class="avatar-preview">
                    <img class="avatar-preview-image"
                         th:classappend="${profileAvatarDataUrl == null or #strings.isEmpty(profileAvatarDataUrl)} ? ' d-none' : ''"
                         th:src="${profileAvatarDataUrl}"
                         data-view-avatar-image
                         alt="Avatar preview">
                    <span class="avatar-preview-fallback"
                          th:classappend="${profileAvatarDataUrl != null and !#strings.isEmpty(profileAvatarDataUrl)} ? ' d-none' : ''"
                          data-view-avatar-fallback
                          th:text="${#strings.substring(profileFormName != null and !#strings.isEmpty(profileFormName) ? profileFormName : currentUser.username, 0, 1).toUpperCase()}">U</span>
                  </div>
                  <div>
                    <div class="info-label">Profile photo</div>
                    <div class="info-value">Visible inside your workspace and exports</div>
                  </div>
                </div>

                <div class="settings-info-list">
                  <div class="info-row">
                    <span class="info-label">Name</span>
                    <strong class="info-value" data-view-field="name" th:text="${profileFormName}">User Name</strong>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Email</span>
                    <strong class="info-value" data-view-field="email" th:text="${profileFormEmail}">user@example.com</strong>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Timezone</span>
                    <strong class="info-value" data-view-field="timezone" th:text="${selectedProfileTimezone}">Asia/Bangkok</strong>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Country</span>
                    <strong class="info-value" data-view-field="country" th:text="${selectedCountry}">Thailand</strong>
                  </div>
                </div>
              </article>

              <article class="settings-card settings-card-secondary">
                <div class="settings-card-topline">
                  <span class="settings-card-kicker">Data and privacy</span>
                  <span class="settings-card-meta">Export files without leaving this workspace</span>
                </div>
                <div class="card-mini-title">Data and Privacy</div>
                <p class="section-copy compact-copy">Generate clean exports without leaving the settings flow.</p>
                <div class="settings-action-grid">
                  <form method="get" th:action="@{/settings/export/all}">
                    <button class="btn btn-outline-dark rounded-pill w-100" type="submit">Export all data</button>
                  </form>
                  <form method="get" th:action="@{/settings/export/trades.csv}">
                    <button class="btn btn-outline-primary rounded-pill w-100" type="submit">Download CSV</button>
                  </form>
                </div>
                <div class="settings-note compact-note">
                  <i class="bi bi-shield-lock"></i>
                  <span>Exports include private trading history. Store them securely.</span>
                </div>
              </article>
            </div>
          </div>

          <div class="settings-mode-edit d-none" data-mode="edit">
            <div class="settings-mode-shell">
              <div class="settings-mode-header">
                <div>
                  <div class="settings-mode-kicker">Editing profile</div>
                  <h3 class="settings-mode-title">Update the account identity shown across your workspace</h3>
                </div>
              </div>
              <article class="settings-card settings-card-primary">
                <form class="row g-3" method="post" th:action="@{/settings/profile}" enctype="multipart/form-data" data-settings-form data-dirty-label="Profile" data-loading-label="Saving profile">
                  <div class="col-12">
                    <div class="profile-identity-card compact-card">
                      <div class="avatar-preview-shell">
                        <div class="avatar-preview">
                          <img class="avatar-preview-image"
                               th:classappend="${profileAvatarDataUrl == null or #strings.isEmpty(profileAvatarDataUrl)} ? ' d-none' : ''"
                               th:src="${profileAvatarDataUrl}"
                               data-avatar-preview
                               alt="Avatar preview">
                          <span class="avatar-preview-fallback"
                                th:classappend="${profileAvatarDataUrl != null and !#strings.isEmpty(profileAvatarDataUrl)} ? ' d-none' : ''"
                                data-avatar-fallback
                                th:text="${#strings.substring(profileFormName != null and !#strings.isEmpty(profileFormName) ? profileFormName : currentUser.username, 0, 1).toUpperCase()}">U</span>
                        </div>
                      </div>
                      <div class="profile-identity-copy">
                        <div class="profile-identity-title">Profile photo</div>
                        <p class="section-copy compact-copy">PNG or JPG, up to 5MB.</p>
                        <div class="d-flex flex-wrap gap-2">
                          <label class="btn btn-outline-dark rounded-pill px-3 mb-0">
                            <i class="bi bi-upload me-1"></i>Upload avatar
                            <input class="d-none" type="file" name="avatarFile" accept="image/*" data-avatar-input>
                          </label>
                          <button class="btn btn-outline-secondary rounded-pill px-3" type="button" data-avatar-reset>Remove</button>
                          <input type="hidden" name="removeAvatar" value="false" data-remove-avatar>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <label class="form-label" for="settingsName">Name</label>
                    <input id="settingsName" class="form-control" type="text" name="name" data-field-input="name" th:value="${profileFormName}">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="settingsEmail">Email</label>
                    <input id="settingsEmail" class="form-control" type="email" name="email" data-field-input="email" th:value="${profileFormEmail}">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="settingsTimezone">Timezone</label>
                    <select id="settingsTimezone" class="form-select" name="timezone" data-field-input="timezone">
                      <option th:each="timezone : ${timezoneOptions}"
                              th:value="${timezone}"
                              th:selected="${timezone == selectedProfileTimezone}"
                              th:text="${timezone}">Asia/Bangkok</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="settingsCountry">Country</label>
                    <select id="settingsCountry" class="form-select" name="country" data-field-input="country">
                      <option th:each="country : ${countryOptions}"
                              th:value="${country}"
                              th:selected="${country == selectedCountry}"
                              th:text="${country}">Thailand</option>
                    </select>
                  </div>
                </form>
              </article>
            </div>
          </div>
        </section>
      </template>

      <template id="settings-template-security">
        <section class="settings-section" data-section-key="security" data-section-title="Security">
          <div class="settings-section-header">
            <div>
              <div class="section-eyebrow">Security</div>
              <h2 class="section-title">Password and account protection</h2>
              <p class="section-copy">Keep credential changes deliberate and put destructive actions behind a hard boundary.</p>
            </div>
            <button class="btn btn-dark rounded-pill settings-edit-button" type="button" data-edit-toggle>
              <i class="bi bi-shield-lock"></i>
              <span>Edit security</span>
            </button>
          </div>

          <div class="alert alert-success settings-inline-alert" data-feedback="success" th:if="${securitySuccess != null}" th:text="${securitySuccess}">Password updated successfully.</div>
          <div class="alert alert-danger settings-inline-alert" data-feedback="error" th:if="${securityError != null}" th:text="${securityError}">Password update failed.</div>
          <div class="alert alert-danger settings-inline-alert" data-feedback="error" th:if="${dangerError != null}" th:text="${dangerError}">Account deletion failed.</div>

          <div class="settings-mode-view" data-mode="view">
            <div class="settings-card-grid">
              <article class="settings-card settings-card-primary">
                <div class="settings-card-topline">
                  <span class="settings-card-kicker">Protection status</span>
                  <span class="settings-card-meta">Credential state and account recovery hygiene</span>
                </div>
                <div class="card-mini-title">Password</div>
                <div class="settings-info-list">
                  <div class="info-row">
                    <span class="info-label">Last known state</span>
                    <strong class="info-value" data-view-field="passwordState">Protected by password authentication</strong>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Recommended</span>
                    <strong class="info-value">Use a unique password and rotate it regularly</strong>
                  </div>
                </div>
              </article>

              <article class="settings-card settings-card-secondary danger-surface">
                <div class="settings-card-topline">
                  <span class="settings-card-kicker">Sensitive actions</span>
                  <span class="settings-card-meta">This area permanently affects your account</span>
                </div>
                <div class="card-mini-title text-danger-emphasis">Danger Zone</div>
                <p class="section-copy compact-copy">Deleting the account permanently removes your profile, trades, screenshots, setups, and reports.</p>
                <div class="danger-checklist compact-checklist">
                  <div><i class="bi bi-x-circle"></i>Trade history is erased permanently.</div>
                  <div><i class="bi bi-x-circle"></i>Active subscriptions should be canceled first.</div>
                  <div><i class="bi bi-x-circle"></i>Exports are your only backup.</div>
                </div>
              </article>
            </div>
          </div>

          <div class="settings-mode-edit d-none" data-mode="edit">
            <div class="settings-mode-shell">
              <div class="settings-mode-header">
                <div>
                  <div class="settings-mode-kicker">Editing security</div>
                  <h3 class="settings-mode-title">Update your password without leaving the control panel</h3>
                </div>
              </div>
              <div class="settings-stack">
                <article class="settings-card settings-card-primary">
                  <form class="row g-3" method="post" th:action="@{/settings/security}" data-settings-form data-dirty-label="Security" data-loading-label="Saving security">
                    <div class="col-12">
                      <div class="security-note-card compact-card">
                        <div class="security-note-title">Password hygiene</div>
                        <p class="mb-0">Use a unique password for your trading workspace and rotate it if exports are handled on shared devices.</p>
                      </div>
                    </div>
                    <div class="col-12">
                      <label class="form-label" for="currentPassword">Current password</label>
                      <input id="currentPassword" class="form-control" type="password" name="currentPassword" placeholder="Enter current password">
                    </div>
                    <div class="col-12">
                      <label class="form-label" for="newPassword">New password</label>
                      <input id="newPassword" class="form-control" type="password" name="newPassword" placeholder="Create a stronger password">
                    </div>
                    <div class="col-12">
                      <label class="form-label" for="confirmPassword">Confirm new password</label>
                      <input id="confirmPassword" class="form-control" type="password" name="confirmPassword" placeholder="Re-enter your new password">
                    </div>
                  </form>
                </article>

                <article class="settings-card settings-card-secondary danger-surface">
                  <div class="settings-card-topline">
                    <span class="settings-card-kicker">Danger zone</span>
                    <span class="settings-card-meta">This action stays on full-page submit for safety</span>
                  </div>
                  <div class="card-mini-title text-danger-emphasis">Delete account</div>
                  <form class="danger-form mt-3" method="post" th:action="@{/settings/delete-account}">
                    <div class="mb-3">
                      <label class="form-label" for="deleteCurrentPassword">Current password</label>
                      <input id="deleteCurrentPassword" class="form-control" type="password" name="currentPassword" placeholder="Enter your current password" required>
                    </div>
                    <div class="mb-0">
                      <label class="form-label" for="deleteConfirmationText">Type DELETE to confirm</label>
                      <input id="deleteConfirmationText" class="form-control" type="text" name="confirmationText" placeholder="DELETE" required>
                    </div>
                    <div class="danger-submit">
                      <button class="btn btn-danger rounded-pill px-4 mt-3" type="submit">Delete account</button>
                    </div>
                  </form>
                </article>
              </div>
            </div>
          </div>
        </section>
      </template>

      <template id="settings-template-preferences">
        <section class="settings-section" data-section-key="preferences" data-section-title="Trading Preferences">
          <div class="settings-section-header">
            <div>
              <div class="section-eyebrow">Trading Preferences</div>
              <h2 class="section-title">Journaling defaults</h2>
              <p class="section-copy">Keep new trade entries fast by locking in sane defaults for your workflow.</p>
            </div>
            <button class="btn btn-dark rounded-pill settings-edit-button" type="button" data-edit-toggle>
              <i class="bi bi-sliders"></i>
              <span>Edit preferences</span>
            </button>
          </div>

          <div class="alert alert-success settings-inline-alert" data-feedback="success" th:if="${preferencesSuccess != null}" th:text="${preferencesSuccess}">Trading preferences updated successfully.</div>
          <div class="alert alert-danger settings-inline-alert" data-feedback="error" th:if="${preferencesError != null}" th:text="${preferencesError}">Trading preferences update failed.</div>

          <div class="settings-mode-view" data-mode="view">
            <article class="settings-card settings-card-primary">
              <div class="settings-card-topline">
                <span class="settings-card-kicker">Execution defaults</span>
                <span class="settings-card-meta">Applied across trade forms and chart review flows</span>
              </div>
              <div class="settings-info-list compact-grid">
                <div class="info-row">
                  <span class="info-label">Default account</span>
                  <strong class="info-value" data-view-field="defaultAccount" th:text="${selectedDefaultAccount}">Personal Journal Account</strong>
                </div>
                <div class="info-row">
                  <span class="info-label">Currency</span>
                  <strong class="info-value" data-view-field="preferredCurrency" th:text="${selectedCurrency}">USD</strong>
                </div>
                <div class="info-row">
                  <span class="info-label">Risk unit</span>
                  <strong class="info-value" data-view-field="riskUnitLabel" th:text="${selectedRiskUnit == 'R_MULTIPLE' ? 'R multiple' : 'Currency'}">R multiple</strong>
                </div>
                <div class="info-row">
                  <span class="info-label">Chart timezone</span>
                  <strong class="info-value" data-view-field="chartTimezone" th:text="${selectedChartTimezone}">America/New_York</strong>
                </div>
              </div>
            </article>
          </div>

          <div class="settings-mode-edit d-none" data-mode="edit">
            <div class="settings-mode-shell">
              <div class="settings-mode-header">
                <div>
                  <div class="settings-mode-kicker">Editing preferences</div>
                  <h3 class="settings-mode-title">Set the defaults used when you journal and review trades</h3>
                </div>
              </div>
              <article class="settings-card settings-card-primary">
                <form class="row g-3" method="post" th:action="@{/settings/preferences}" data-settings-form data-dirty-label="Trading Preferences" data-loading-label="Saving preferences">
                  <div class="col-md-6">
                    <label class="form-label" for="defaultAccount">Default account</label>
                    <select id="defaultAccount" class="form-select" name="defaultAccount" data-field-input="defaultAccount">
                      <option th:each="account : ${accountOptions}"
                              th:value="${account}"
                              th:selected="${account == selectedDefaultAccount}"
                              th:text="${account}">Personal Journal Account</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="defaultCurrency">Currency</label>
                    <select id="defaultCurrency" class="form-select" name="preferredCurrency" data-field-input="preferredCurrency">
                      <option th:each="currency : ${currencyOptions}"
                              th:value="${currency}"
                              th:selected="${currency == selectedCurrency}"
                              th:text="${currency}">USD</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="riskUnit">Risk unit</label>
                    <select id="riskUnit" class="form-select" name="riskUnit" data-field-input="riskUnit">
                      <option th:each="riskUnit : ${riskUnitOptions}"
                              th:value="${riskUnit}"
                              th:selected="${riskUnit == selectedRiskUnit}"
                              th:text="${riskUnit == 'R_MULTIPLE' ? 'R multiple' : 'Currency'}">R multiple</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="chartTimezone">Chart timezone</label>
                    <select id="chartTimezone" class="form-select" name="chartTimezone" data-field-input="chartTimezone">
                      <option th:each="timezone : ${timezoneOptions}"
                              th:value="${timezone}"
                              th:selected="${timezone == selectedChartTimezone}"
                              th:text="${timezone}">America/New_York</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <div class="prefs-note-grid compact-grid-two">
                      <div class="prefs-note-card">
                        <span>Defaults apply to</span>
                        <strong>Trade forms and chart review views</strong>
                      </div>
                      <div class="prefs-note-card">
                        <span>Best practice</span>
                        <strong>Match chart timezone to your execution session</strong>
                      </div>
                    </div>
                  </div>
                </form>
              </article>
            </div>
          </div>
        </section>
      </template>

      <template id="settings-template-notifications">
        <section class="settings-section" data-section-key="notifications" data-section-title="Notifications">
          <div class="settings-section-header">
            <div>
              <div class="section-eyebrow">Notifications</div>
              <h2 class="section-title">Email signals and summaries</h2>
              <p class="section-copy">Keep the signal-to-noise ratio high and only receive updates you actually care about.</p>
            </div>
            <button class="btn btn-dark rounded-pill settings-edit-button" type="button" data-edit-toggle>
              <i class="bi bi-bell"></i>
              <span>Edit notifications</span>
            </button>
          </div>

          <div class="alert alert-success settings-inline-alert" data-feedback="success" th:if="${notificationsSuccess != null}" th:text="${notificationsSuccess}">Notification settings updated successfully.</div>

          <div class="settings-mode-view" data-mode="view">
            <article class="settings-card settings-card-primary">
              <div class="settings-card-topline">
                <span class="settings-card-kicker">Signal routing</span>
                <span class="settings-card-meta">Only the highest-value updates should reach your inbox</span>
              </div>
              <div class="switch-stack compact-stack">
                <div class="switch-card compact-card">
                  <div>
                    <div class="switch-title">Email notifications</div>
                    <p class="section-copy mb-0" data-view-field="emailNotificationsSummary" th:text="${emailNotificationsEnabled ? 'Enabled for important account activity.' : 'Disabled.'}">Enabled for important account activity.</p>
                  </div>
                  <span class="settings-badge" data-view-field="emailNotificationsBadge" th:text="${emailNotificationsEnabled ? 'On' : 'Off'}">On</span>
                </div>
                <div class="switch-card compact-card">
                  <div>
                    <div class="switch-title">Weekly report summary</div>
                    <p class="section-copy mb-0" data-view-field="weeklySummarySummary" th:text="${weeklySummaryEnabled ? 'Weekly summaries are enabled.' : 'Weekly summaries are disabled.'}">Weekly summaries are enabled.</p>
                  </div>
                  <span class="settings-badge" data-view-field="weeklySummaryBadge" th:text="${weeklySummaryEnabled ? 'On' : 'Off'}">On</span>
                </div>
                <div class="switch-card compact-card">
                  <div>
                    <div class="switch-title">Billing notifications</div>
                    <p class="section-copy mb-0" data-view-field="billingNotificationsSummary" th:text="${billingNotificationsEnabled ? 'Billing notices are enabled.' : 'Billing notices are disabled.'}">Billing notices are enabled.</p>
                  </div>
                  <span class="settings-badge" data-view-field="billingNotificationsBadge" th:text="${billingNotificationsEnabled ? 'On' : 'Off'}">On</span>
                </div>
              </div>
            </article>
          </div>

          <div class="settings-mode-edit d-none" data-mode="edit">
            <div class="settings-mode-shell">
              <div class="settings-mode-header">
                <div>
                  <div class="settings-mode-kicker">Editing notifications</div>
                  <h3 class="settings-mode-title">Tune your inbox so reporting stays useful instead of noisy</h3>
                </div>
              </div>
              <article class="settings-card settings-card-primary">
                <form method="post" th:action="@{/settings/notifications}" data-settings-form data-dirty-label="Notifications" data-loading-label="Saving notifications">
                  <div class="switch-stack">
                    <div class="switch-card compact-card">
                      <div>
                        <div class="switch-title">Email notifications</div>
                        <p class="section-copy mb-0">Important account activity and login alerts.</p>
                      </div>
                      <div class="settings-switch-shell">
                        <input type="hidden" name="emailNotificationsEnabled" value="false">
                        <label class="settings-switch">
                          <input id="emailNotifications" class="settings-switch-input" type="checkbox" name="emailNotificationsEnabled" value="true" data-field-input="emailNotificationsEnabled" th:checked="${emailNotificationsEnabled}">
                          <span class="settings-switch-track"></span>
                        </label>
                      </div>
                    </div>
                    <div class="switch-card compact-card">
                      <div>
                        <div class="switch-title">Weekly report summary</div>
                        <p class="section-copy mb-0">Receive a weekly recap of performance, mistakes, and process quality.</p>
                      </div>
                      <div class="settings-switch-shell">
                        <input type="hidden" name="weeklySummaryEnabled" value="false">
                        <label class="settings-switch">
                          <input id="weeklySummary" class="settings-switch-input" type="checkbox" name="weeklySummaryEnabled" value="true" data-field-input="weeklySummaryEnabled" th:checked="${weeklySummaryEnabled}">
                          <span class="settings-switch-track"></span>
                        </label>
                      </div>
                    </div>
                    <div class="switch-card compact-card">
                      <div>
                        <div class="switch-title">Billing notifications</div>
                        <p class="section-copy mb-0">Renewals, invoices, payment failures, and trial reminders.</p>
                      </div>
                      <div class="settings-switch-shell">
                        <input type="hidden" name="billingNotificationsEnabled" value="false">
                        <label class="settings-switch">
                          <input id="billingNotifications" class="settings-switch-input" type="checkbox" name="billingNotificationsEnabled" value="true" data-field-input="billingNotificationsEnabled" th:checked="${billingNotificationsEnabled}">
                          <span class="settings-switch-track"></span>
                        </label>
                      </div>
                    </div>
                  </div>
                </form>
              </article>
            </div>
          </div>
        </section>
      </template>
    </main>
  </div>
</div>

<script th:src="@{/js/sidebar-toggle.js}" src="/js/sidebar-toggle.js"></script>
<script th:src="@{/js/settings-page.js}" src="/js/settings-page.js"></script>
</body>
</html>
