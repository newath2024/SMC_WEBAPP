<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Setups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/sidebar-toggle.css}" href="/css/sidebar-toggle.css" rel="stylesheet">
  <link th:href="@{/css/analytics-dashboard.css}" href="/css/analytics-dashboard.css" rel="stylesheet">
  <link th:href="@{/css/app-page.css}" href="/css/app-page.css" rel="stylesheet">
</head>

<body class="dashboard-body app-page-body">
<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell collapsible-shell expanded">
    <aside th:replace="~{fragments/sidebar :: appSidebar('setups', @{/dashboard/export.csv(period='ALL')})}"></aside>

    
    <main class="main-content">

    <div class="d-flex align-items-center gap-2 mb-3">
      <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle navigation">
        <i class="bi bi-layout-sidebar-inset"></i>
      </button>
    </div>
      <h2 th:text="${adminView} ? 'All Trading Setups' : 'My Trading Setups'">My Trading Setups</h2>

      <a class="btn btn-primary mb-3"
         th:href="@{/setups/new}">
         + New Setup
      </a>

      <table class="table table-bordered bg-white">

      <thead>
      <tr>
      <th>Name</th>
      <th>Description</th>
      <th th:if="${adminView}">Owner</th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="s : ${setups}">
      <td th:text="${s.name}"></td>
      <td th:text="${s.description}"></td>
      <td th:if="${adminView}" th:text="${s.user != null ? s.user.username : '-'}"></td>
      </tr>

      </tbody>
      </table>
    </main>
  </div>
</div>

  <script th:src="@{/js/sidebar-toggle.js}" src="/js/sidebar-toggle.js"></script>

</body>
</html>
