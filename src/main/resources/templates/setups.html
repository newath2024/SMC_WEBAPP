<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Setups</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  .app-shell {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .sidebar {
    width: 220px;
    position: sticky;
    top: 16px;
  }
  .main-content {
    flex: 1;
    min-width: 0;
  }
  .sidebar-card {
    border: 0;
    border-radius: 16px;
    overflow: hidden;
    height: calc(100vh - 40px);
  }
  .sidebar-title {
    font-size: 12px;
    text-transform: none;
    letter-spacing: 0.08em;
    color: #6b7280;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .sidebar-nav {
    flex: 1;
  }
  .sidebar-link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 10px;
    color: #334155;
    font-weight: 600;
    padding: 10px 12px;
    text-decoration: none;
    border-left: 3px solid transparent;
  }
  .sidebar-link:hover {
    background: #f1f5f9;
    color: #0f172a;
  }
  .sidebar-link.active {
    background: #e8f1ff;
    border-left-color: #2563eb;
    color: #1e40af;
    font-weight: 600;
  }
  .sidebar-icon {
    width: 16px;
    text-align: center;
    opacity: 0.9;
  }
  .sidebar-footer {
    border-top: 1px solid #e2e8f0;
    margin-top: 14px;
    padding-top: 14px;
  }
  .sidebar-logout-btn {
    border: 0;
    background: transparent;
    color: #dc2626;
    font-weight: 600;
    text-align: left;
    padding: 8px 10px;
    width: 100%;
    border-radius: 10px;
  }
  .sidebar-logout-btn:hover {
    background: #fef2f2;
  }
  .user-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #334155;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    padding: 6px 10px;
    max-width: 100%;
  }
  .user-pill-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 140px;
  }
  @media (max-width: 991.98px) {
    .app-shell {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      position: static;
    }
    .sidebar-card {
      height: auto;
    }
  }
</style>
</head>

<body class="bg-light">
<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="card shadow-sm sidebar-card">
        <div class="card-body d-flex flex-column">
          <div class="sidebar-title">Navigation</div>
          <div class="d-grid gap-1 sidebar-nav">
            <a th:if="${currentUser != null and currentUser.role != null and #strings.equalsIgnoreCase(currentUser.role, 'ADMIN')}" th:href="@{/admin}" class="sidebar-link"><i class="bi bi-speedometer2 sidebar-icon"></i> Dashboard</a>
            <a th:href="@{/analytics(period='ALL')}" class="sidebar-link"><i class="bi bi-graph-up-arrow sidebar-icon"></i> Analytics</a>
            <a th:if="${currentUser == null or currentUser.role == null or !#strings.equalsIgnoreCase(currentUser.role, 'ADMIN')}" th:href="@{/trades}" class="sidebar-link"><i class="bi bi-journal-text sidebar-icon"></i> Trades</a>
            <a th:href="@{/mistakes}" class="sidebar-link"><i class="bi bi-exclamation-triangle sidebar-icon"></i> Mistakes</a>
            <a th:href="@{/setups}" class="sidebar-link active"><i class="bi bi-diagram-3 sidebar-icon"></i> Setups</a>
            <a th:if="${currentUser != null and currentUser.role != null and #strings.equalsIgnoreCase(currentUser.role, 'ADMIN')}" th:href="@{/admin}" class="sidebar-link"><i class="bi bi-shield-lock sidebar-icon"></i> Management</a>
            <a th:href="@{/analytics/export.csv(period='ALL')}" class="sidebar-link"><i class="bi bi-download sidebar-icon"></i> Export CSV</a>
          </div>
          <div class="sidebar-footer">
            <div class="user-pill mb-2" th:if="${currentUser != null}">
              <i class="bi bi-person-circle"></i>
              <span class="user-pill-name" th:text="${currentUser.username}">username</span>
            </div>
            <form method="post" action="/logout">
              <button class="sidebar-logout-btn" type="submit"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
            </form>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <h2 th:text="${adminView} ? 'All Trading Setups' : 'My Trading Setups'">My Trading Setups</h2>

      <a class="btn btn-primary mb-3"
         th:href="@{/setups/new}">
         + New Setup
      </a>

      <table class="table table-bordered bg-white">

      <thead>
      <tr>
      <th>Name</th>
      <th>Description</th>
      <th th:if="${adminView}">Owner</th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="s : ${setups}">
      <td th:text="${s.name}"></td>
      <td th:text="${s.description}"></td>
      <td th:if="${adminView}" th:text="${s.user != null ? s.user.username : '-'}"></td>
      </tr>

      </tbody>
      </table>
    </main>
  </div>
</div>

</body>
</html>
