<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Setups</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  .app-shell {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .sidebar {
    width: 220px;
    position: sticky;
    top: 16px;
  }
  .main-content {
    flex: 1;
    min-width: 0;
  }
  .sidebar-card {
    border: 0;
    border-radius: 16px;
  }
  .sidebar-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b7280;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 10px;
    color: #334155;
    font-weight: 500;
    padding: 10px 12px;
    text-decoration: none;
  }
  .sidebar-link:hover {
    background: #e2e8f0;
    color: #0f172a;
  }
  .sidebar-link.active {
    background: #dbeafe;
    color: #1d4ed8;
    font-weight: 600;
  }
  @media (max-width: 991.98px) {
    .app-shell {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      position: static;
    }
  }
</style>
</head>

<body class="bg-light">
<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="card shadow-sm sidebar-card">
        <div class="card-body">
          <div class="sidebar-title">Navigation</div>
          <div class="d-grid gap-1">
            <a th:href="@{/analytics}" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a th:href="@{/trades}" class="sidebar-link"><i class="bi bi-journal-text"></i> Trades</a>
            <a th:href="@{/analytics(period='ALL')}" class="sidebar-link"><i class="bi bi-graph-up-arrow"></i> Analytics</a>
            <a th:href="@{/mistakes}" class="sidebar-link"><i class="bi bi-exclamation-triangle"></i> Mistakes</a>
            <a th:href="@{/setups}" class="sidebar-link active"><i class="bi bi-diagram-3"></i> Setups</a>
            <a th:if="${currentUser != null and currentUser.role != null and #strings.equalsIgnoreCase(currentUser.role, 'ADMIN')}" th:href="@{/admin}" class="sidebar-link"><i class="bi bi-shield-lock"></i> Management</a>
            <a th:if="${currentUser != null and currentUser.role != null and #strings.equalsIgnoreCase(currentUser.role, 'ADMIN')}" th:href="@{/analytics/export.csv(period='ALL')}" class="sidebar-link text-success"><i class="bi bi-download"></i> Export CSV</a>
            <form method="post" action="/logout">
              <button class="btn btn-outline-danger w-100 mt-2" type="submit">Logout</button>
            </form>
          </div>
          <div class="text-muted small mt-3" th:if="${currentUser != null}">
            Logged in as <strong th:text="${currentUser.username}"></strong>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <h2 th:text="${adminView} ? 'All Trading Setups' : 'My Trading Setups'">My Trading Setups</h2>

      <a class="btn btn-primary mb-3"
         th:href="@{/setups/new}">
         + New Setup
      </a>

      <table class="table table-bordered bg-white">

      <thead>
      <tr>
      <th>Name</th>
      <th>Description</th>
      <th th:if="${adminView}">Owner</th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="s : ${setups}">
      <td th:text="${s.name}"></td>
      <td th:text="${s.description}"></td>
      <td th:if="${adminView}" th:text="${s.user != null ? s.user.username : '-'}"></td>
      </tr>

      </tbody>
      </table>
    </main>
  </div>
</div>

</body>
</html>
