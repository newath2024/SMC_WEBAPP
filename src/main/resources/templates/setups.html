<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Setups</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h2>My Trading Setups</h2>

<a class="btn btn-primary mb-3"
   th:href="@{/setups/new}">
   + New Setup
</a>

<table class="table table-bordered">

<thead>
<tr>
<th>Name</th>
<th>Description</th>
</tr>
</thead>

<tbody>

<tr th:each="s : ${setups}">
<td th:text="${s.name}"></td>
<td th:text="${s.description}"></td>
</tr>

</tbody>
</table>

<a th:href="@{/trades}" class="btn btn-secondary">
Back to Trades
</a>

</body>
</html>
