<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Management Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/sidebar-toggle.css}" href="/css/sidebar-toggle.css" rel="stylesheet">
  <link th:href="@{/css/analytics-dashboard.css}" href="/css/analytics-dashboard.css" rel="stylesheet">
  <link th:href="@{/css/app-page.css}" href="/css/app-page.css" rel="stylesheet">
</head>
<body class="dashboard-body app-page-body">

<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell collapsible-shell expanded">
    <aside th:replace="~{fragments/sidebar :: appSidebar('admin', @{/dashboard/export.csv(period='ALL')})}"></aside>

    
    <main class="main-content">

    <div class="d-flex align-items-center gap-2 mb-3">
      <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle navigation">
        <i class="bi bi-layout-sidebar-inset"></i>
      </button>
    </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="m-0">Management Dashboard</h2>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted small">Total Users</div>
          <div class="fs-3 fw-bold" th:text="${totalUsers}">0</div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted small">Active Users</div>
          <div class="fs-3 fw-bold" th:text="${activeUsers}">0</div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted small">Inactive Users</div>
          <div class="fs-3 fw-bold" th:text="${inactiveUsers}">0</div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted small">Total Trades</div>
          <div class="fs-3 fw-bold" th:text="${totalTrades}">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">Users</h5>

      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Created At</th>
            <th style="width: 220px;">Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="u : ${users}">
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
            <td>
              <span class="badge text-bg-success" th:if="${u.active}">ACTIVE</span>
              <span class="badge text-bg-secondary" th:if="${!u.active}">INACTIVE</span>
            </td>
            <td th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
            <td>
              <div class="d-flex gap-2">
                <form th:action="@{/admin/users/{id}/toggle-active(id=${u.id})}" method="post">
                  <button class="btn btn-sm btn-warning"
                          type="submit"
                          th:text="${u.active} ? 'Disable' : 'Enable'">
                    Toggle
                  </button>
                </form>

                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                    method="post"
                    th:if="${u.id != currentUser.id}"
                    onsubmit="return confirm('Delete this user?');">
                  <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="6" class="text-center text-muted">No users found.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="card-title mb-3">All Trades</h5>

      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
          <tr>
            <th>User</th>
            <th>Symbol</th>
            <th>Direction</th>
            <th>Entry Time</th>
            <th>Result</th>
            <th>PnL</th>
            <th>R</th>
            <th style="width: 180px;">Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="t : ${trades}">
            <td th:text="${t.user != null ? t.user.username : '-'}"></td>
            <td>
              <a th:href="@{/trades/{id}(id=${t.id})}" th:text="${t.symbol}"></a>
            </td>
            <td th:text="${t.direction}"></td>
            <td th:text="${t.entryTime != null ? #temporals.format(t.entryTime, 'yyyy-MM-dd HH:mm') : '-'}"></td>
            <td th:text="${t.result}"></td>
            <td th:text="${#numbers.formatDecimal(t.pnl,1,2)}"></td>
            <td th:text="${#numbers.formatDecimal(t.rMultiple,1,2)}"></td>
            <td>
              <form th:action="@{/admin/trades/{id}/delete(id=${t.id})}"
                    method="post"
                    onsubmit="return confirm('Delete this trade?');">
                <button class="btn btn-sm btn-danger" type="submit">Delete</button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(trades)}">
            <td colspan="8" class="text-center text-muted">No trades found.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

    </main>
  </div>
</div>

  <script th:src="@{/js/sidebar-toggle.js}" src="/js/sidebar-toggle.js"></script>

</body>
</html>
