<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
  <aside class="app-sidebar sidebar"
         th:fragment="appSidebar(activePage, exportHref)">
    <div class="card shadow-sm sidebar-card sidebar-panel">
      <div class="card-body d-flex flex-column">
      <a class="sidebar-brand"
         th:href="${currentUser != null and currentUser.role != null and #strings.equalsIgnoreCase(currentUser.role, 'ADMIN')} ? @{/admin} : @{/dashboard(period='ALL')}">
        <img class="sidebar-brand-logo-full logo-text"
             th:src="@{/img/tradejournal-logo-full.svg}"
             src="/img/tradejournal-logo-full.svg"
             alt="TradeJournal">
      </a>

      <th:block th:if="${currentUser != null and currentUser.role != null and #strings.equalsIgnoreCase(currentUser.role, 'ADMIN')}">
        <nav class="sidebar-nav-group">
          <div class="sidebar-group-title sidebar-title">PLATFORM</div>
          <a th:href="@{/admin}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'admin-dashboard'} ? ' active' : ''">
            <i class="bi bi-grid-1x2 sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Dashboard</span>
          </a>
          <a th:href="@{/admin/analytics}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'admin-analytics'} ? ' active' : ''">
            <i class="bi bi-activity sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Analytics</span>
          </a>
        </nav>

        <nav class="sidebar-nav-group">
          <div class="sidebar-group-title sidebar-title">TRADING DATA</div>
          <a th:href="@{/setups}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'setups'} ? ' active' : ''">
            <i class="bi bi-sliders2 sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Setups</span>
          </a>
          <a th:href="@{/mistakes}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'mistakes'} ? ' active' : ''">
            <i class="bi bi-exclamation-triangle sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Mistakes</span>
          </a>
          <a th:href="@{/admin#recent-activity}"
             class="sidebar-link nav-item">
            <i class="bi bi-file-earmark-text sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Reports</span>
          </a>
        </nav>

        <nav class="sidebar-nav-group">
          <div class="sidebar-group-title sidebar-title">SYSTEM</div>
          <a th:href="@{/admin/users}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'admin-users'} ? ' active' : ''">
            <i class="bi bi-people sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Users</span>
          </a>
          <a th:href="@{/admin/settings}"
             class="sidebar-link nav-item">
            <i class="bi bi-credit-card-2-front sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Billing</span>
          </a>
          <a th:href="@{/admin/settings}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'admin-settings'} ? ' active' : ''">
            <i class="bi bi-gear-fill sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Settings</span>
          </a>
        </nav>
      </th:block>

      <th:block th:if="${currentUser == null or currentUser.role == null or !#strings.equalsIgnoreCase(currentUser.role, 'ADMIN')}">
        <nav class="sidebar-nav-group">
          <div class="sidebar-group-title sidebar-title">MAIN</div>
          <a th:href="@{/dashboard(period='ALL')}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
            <i class="bi bi-bar-chart-line sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Dashboard</span>
          </a>
          <a th:href="@{/trades}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'trades'} ? ' active' : ''">
            <i class="bi bi-graph-up-arrow sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Trades</span>
          </a>
          <a th:href="@{/analytics}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'analytics'} ? ' active' : ''">
            <i class="bi bi-activity sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Analytics</span>
          </a>
          <a th:href="@{/setups}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'setups'} ? ' active' : ''">
            <i class="bi bi-sliders2 sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Setups</span>
          </a>
          <a th:href="@{/mistakes}"
             class="sidebar-link nav-item"
             th:classappend="${activePage == 'mistakes'} ? ' active' : ''">
            <i class="bi bi-exclamation-triangle sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Mistakes</span>
          </a>
        </nav>

        <nav class="sidebar-nav-group">
          <div class="sidebar-group-title sidebar-title">REPORTING</div>
          <a th:href="@{/dashboard(period=${period != null ? period : 'ALL'}, from=${from}, to=${to}, userId=${selectedUserId})}"
             class="sidebar-link nav-item">
            <i class="bi bi-file-earmark-text sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Reports</span>
          </a>
          <a th:if="${currentUser != null and (currentUser.role != null and #strings.equalsIgnoreCase(currentUser.role, 'ADMIN') or currentUser.planType != null and (currentUser.planType.name() == 'PRO' or currentUser.planType.name() == 'ADMIN'))}"
             th:href="${exportHref}"
             class="sidebar-link nav-item">
            <i class="bi bi-box-arrow-down sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Export CSV</span>
          </a>
          <a th:if="${currentUser == null or ((currentUser.role == null or !#strings.equalsIgnoreCase(currentUser.role, 'ADMIN')) and (currentUser.planType == null or (currentUser.planType.name() != 'PRO' and currentUser.planType.name() != 'ADMIN')))}"
             th:href="@{/dashboard(period=${period != null ? period : 'ALL'}, from=${from}, to=${to}, userId=${selectedUserId})}"
             class="sidebar-link nav-item disabled">
            <i class="bi bi-box-arrow-down sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Export CSV (Pro)</span>
          </a>
        </nav>

        <nav class="sidebar-nav-group">
          <div class="sidebar-group-title sidebar-title">ACCOUNT</div>
          <a th:href="@{/dashboard(period=${period != null ? period : 'ALL'}, from=${from}, to=${to}, userId=${selectedUserId})}"
             class="sidebar-link nav-item">
            <i class="bi bi-credit-card-2-front sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Billing</span>
          </a>
          <a th:href="@{/dashboard(period=${period != null ? period : 'ALL'}, from=${from}, to=${to}, userId=${selectedUserId})}"
             class="sidebar-link nav-item">
            <i class="bi bi-gear-fill sidebar-icon nav-icon"></i>
            <span class="nav-label nav-text">Settings</span>
          </a>
        </nav>
      </th:block>

      <div class="sidebar-plan"
           th:if="${currentUser == null or currentUser.role == null or !#strings.equalsIgnoreCase(currentUser.role, 'ADMIN')}">
        <div class="sidebar-plan-name"
             th:text="${currentUser != null and currentUser.planType != null and currentUser.planType.name() == 'PRO'} ? 'Pro Plan' : 'Standard Plan'">Standard Plan</div>
        <div class="sidebar-plan-usage"
             th:if="${currentUser == null or currentUser.planType == null or currentUser.planType.name() != 'PRO'}">
          <span th:text="${tradeUsage != null ? tradeUsage : 0}">0</span>
          <span>/</span>
          <span th:text="${tradeUsageLimit != null ? tradeUsageLimit : 100}">100</span>
          <span>trades used</span>
        </div>
        <div class="sidebar-plan-usage"
             th:if="${currentUser != null and currentUser.planType != null and currentUser.planType.name() == 'PRO'}">
          <span>Unlimited trades</span>
        </div>
        <div class="sidebar-plan-bar">
          <span th:style="'width:' + ${(tradeUsageLimit != null and tradeUsageLimit > 0) ? T(java.lang.Math).min(100, (tradeUsage != null ? tradeUsage : 0) * 100 / tradeUsageLimit) : 100} + '%'"></span>
        </div>
        <a class="sidebar-upgrade"
           th:if="${currentUser == null or currentUser.planType == null or currentUser.planType.name() != 'PRO'}"
           th:href="@{/dashboard(period=${period != null ? period : 'ALL'}, from=${from}, to=${to}, userId=${selectedUserId})}">
          Upgrade to Pro
        </a>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-user user-pill" th:if="${currentUser != null}">
          <div class="sidebar-avatar" th:text="${#strings.substring(currentUser.username, 0, 1).toUpperCase()}">U</div>
          <div class="sidebar-user-copy">
            <div class="sidebar-user-name" th:text="${currentUser.username}">username</div>
            <div class="sidebar-user-role"
                 th:text="${currentUser.planType != null ? currentUser.planType.name() : (currentUser.role != null ? currentUser.role : 'Trader')}">Trader</div>
          </div>
        </div>
        <form method="post" action="/logout">
          <button class="sidebar-logout-btn" type="submit">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
          </button>
        </form>
      </div>
      </div>
    </div>
  </aside>
</body>
</html>
