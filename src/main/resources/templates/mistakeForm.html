<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${editMode ? 'Edit Mistake' : 'New Mistake'}">Mistake Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="m-0" th:text="${editMode ? 'Edit Mistake Tag' : 'Create Mistake Tag'}">Mistake Tag</h2>
      <div class="text-muted">
        Logged in as <strong th:text="${currentUser.username}"></strong>
      </div>
    </div>

    <a class="btn btn-outline-secondary" href="/mistakes">Back to Mistakes</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <form th:if="${editMode}" th:action="@{/mistakes/{id}/edit(id=${mistake.id})}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Code</label>
            <input class="form-control" type="text" name="code" th:value="${mistake.code}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" name="name" th:value="${mistake.name}" required>
          </div>

          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="4" th:text="${mistake.description}"></textarea>
          </div>

          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="active" value="true" id="active"
                     th:checked="${mistake.active}">
              <label class="form-check-label" for="active">Active</label>
            </div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit"
                    th:text="${editMode ? 'Update Mistake' : 'Create Mistake'}">
              Save
            </button>
            <a class="btn btn-outline-secondary" href="/mistakes">Cancel</a>
          </div>
        </div>
      </form>

      <form th:if="${!editMode}" th:action="@{/mistakes}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Code</label>
            <input class="form-control" type="text" name="code" th:value="${mistake.code}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" name="name" th:value="${mistake.name}" required>
          </div>

          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="4" th:text="${mistake.description}"></textarea>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit"
                    th:text="${editMode ? 'Update Mistake' : 'Create Mistake'}">
              Save
            </button>
            <a class="btn btn-outline-secondary" href="/mistakes">Cancel</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
