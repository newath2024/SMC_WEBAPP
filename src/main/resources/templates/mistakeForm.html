<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${editMode ? 'Edit Mistake' : 'New Mistake'}">Mistake Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/sidebar-toggle.css}" href="/css/sidebar-toggle.css" rel="stylesheet">
  <link th:href="@{/css/analytics-dashboard.css}" href="/css/analytics-dashboard.css" rel="stylesheet">
  <link th:href="@{/css/app-page.css}" href="/css/app-page.css" rel="stylesheet">
</head>
<body class="dashboard-body app-page-body">

<div class="container-fluid py-3 px-3 px-lg-4">
  <div class="app-shell collapsible-shell expanded">
    <aside th:replace="~{fragments/sidebar :: appSidebar('mistakes', @{/dashboard/export.csv(period='ALL')})}"></aside>

    
    <main class="main-content">

    <div class="d-flex align-items-center gap-2 mb-3">
      <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle navigation">
        <i class="bi bi-layout-sidebar-inset"></i>
      </button>
    </div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="m-0" th:text="${editMode ? 'Edit Mistake Tag' : 'Create Mistake Tag'}">Mistake Tag</h2>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <form th:if="${editMode}" th:action="@{/mistakes/{id}/edit(id=${mistake.id})}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Code</label>
            <input class="form-control" type="text" name="code" th:value="${mistake.code}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" name="name" th:value="${mistake.name}" required>
          </div>

          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="4" th:text="${mistake.description}"></textarea>
          </div>

          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="active" value="true" id="active"
                     th:checked="${mistake.active}">
              <label class="form-check-label" for="active">Active</label>
            </div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit"
                    th:text="${editMode ? 'Update Mistake' : 'Create Mistake'}">
              Save
            </button>
            <a class="btn btn-outline-secondary" href="/mistakes">Cancel</a>
          </div>
        </div>
      </form>

      <form th:if="${!editMode}" th:action="@{/mistakes}" method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Code</label>
            <input class="form-control" type="text" name="code" th:value="${mistake.code}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" name="name" th:value="${mistake.name}" required>
          </div>

          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="4" th:text="${mistake.description}"></textarea>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit"
                    th:text="${editMode ? 'Update Mistake' : 'Create Mistake'}">
              Save
            </button>
            <a class="btn btn-outline-secondary" href="/mistakes">Cancel</a>
          </div>
        </div>
      </form>
    </div>
  </div>
    </main>
  </div>
</div>

  <script th:src="@{/js/sidebar-toggle.js}" src="/js/sidebar-toggle.js"></script>

</body>
</html>
