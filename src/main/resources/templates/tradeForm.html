<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${editMode} ? 'Edit Trade' : 'Trade Form'">Trade Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="m-0" th:text="${editMode} ? 'Edit Trade' : 'Trade Form'">Edit Trade</h2>
      <div class="text-muted" th:if="${currentUser != null}">
        Logged in as <strong th:text="${currentUser.username}"></strong>
      </div>
    </div>

    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" th:href="@{/trades/{id}(id=${trade.id})}">Back to Detail</a>
      <a class="btn btn-outline-primary" href="/trades">Back to Trades</a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>
      <form th:action="@{/trades/{id}/edit(id=${trade.id})}" th:object="${trade}" method="post" enctype="multipart/form-data">
        <div class="row g-3">

          <div class="col-md-3">
            <label class="form-label">Account</label>
            <input class="form-control" type="text" th:field="*{accountLabel}">
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('accountLabel')}"
                 th:errors="*{accountLabel}"></div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Symbol</label>
            <select id="symbol" th:field="*{symbol}" class="form-select">
              <option value="">-- Select Symbol --</option>
              <option value="XAUUSD">XAUUSD</option>
              <option value="EURUSD">EURUSD</option>
              <option value="GBPUSD">GBPUSD</option>
              <option value="USDJPY">USDJPY</option>
              <option value="BTCUSD">BTCUSD</option>
              <option value="ETHUSD">ETHUSD</option>
            </select>
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('symbol')}"
                 th:errors="*{symbol}"></div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Direction</label>
            <select id="direction" class="form-select" th:field="*{direction}">
              <option value="">-- Select --</option>
              <option value="BUY">BUY</option>
              <option value="SELL">SELL</option>
            </select>
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('direction')}"
                 th:errors="*{direction}"></div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Setup</label>
            <select class="form-select" th:field="*{setup.id}">
              <option value="">-- Select setup --</option>
              <option th:each="s : ${setups}"
                      th:value="${s.id}"
                      th:text="${s.name}">
              </option>
            </select>
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('setup')}"
                 th:errors="*{setup}"></div>
          </div>

          <div class="col-md-3">
            <label class="form-label">HTF</label>
            <select class="form-select" th:field="*{htf}">
              <option value="">-- Select --</option>
              <option value="H4">H4</option>
              <option value="H1">H1</option>
              <option value="M30">M30</option>
              <option value="M15">M15</option>
              <option value="M5">M5</option>
              <option value="M1">M1</option>
            </select>
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('htf')}"
                 th:errors="*{htf}"></div>
          </div>

          <div class="col-md-3">
            <label class="form-label">LTF</label>
            <select class="form-select" th:field="*{ltf}">
              <option value="">-- Select --</option>
              <option value="H1">H1</option>
              <option value="M30">M30</option>
              <option value="M15">M15</option>
              <option value="M5">M5</option>
              <option value="M1">M1</option>
            </select>
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('ltf')}"
                 th:errors="*{ltf}"></div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Session</label>
            <select class="form-select" th:field="*{session}">
              <option value="">-- Select --</option>
              <option value="ASIA">ASIA</option>
              <option value="LONDON">LONDON</option>
              <option value="NEW_YORK">NEW_YORK</option>
              <option value="OTHER">OTHER</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Result</label>
            <select id="result" class="form-select" th:field="*{result}">
              <option value="">-- Select --</option>
              <option value="WIN">WIN</option>
              <option value="LOSS">LOSS</option>
              <option value="BE and take partial">BE and take partial</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Entry Time</label>
            <input class="form-control"
                   type="datetime-local"
                   name="entryTime"
                   th:value="${trade.entryTime != null ? #temporals.format(trade.entryTime, 'yyyy-MM-dd''T''HH:mm') : ''}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Exit Time</label>
            <input class="form-control"
                   type="datetime-local"
                   name="exitTime"
                   th:value="${trade.exitTime != null ? #temporals.format(trade.exitTime, 'yyyy-MM-dd''T''HH:mm') : ''}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Entry Price</label>
            <input id="entryPrice" class="form-control" type="number" step="0.00001" th:field="*{entryPrice}">
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('entryPrice')}"
                 th:errors="*{entryPrice}"></div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Stop Loss</label>
            <input id="stopLoss" class="form-control" type="number" step="0.00001" th:field="*{stopLoss}">
            <div class="text-danger small"
                 th:if="${#fields.hasErrors('stopLoss')}"
                 th:errors="*{stopLoss}"></div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Take Profit</label>
            <input class="form-control" type="number" step="0.00001" th:field="*{takeProfit}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Exit Price</label>
            <input id="exitPrice" class="form-control" type="number" step="0.00001" th:field="*{exitPrice}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Position Size</label>
            <input id="positionSize" class="form-control" type="number" step="0.01" th:field="*{positionSize}">
            <div id="volumeHint" class="form-text">Unit: lot</div>
          </div>

          <div class="col-md-3">
            <label class="form-label">PnL</label>
            <input id="pnl" class="form-control" type="number" step="0.01" th:field="*{pnl}" readonly>
          </div>

          <div class="col-md-3">
            <label class="form-label">R Multiple</label>
            <input id="rMultiple" class="form-control" type="number" step="0.01" th:field="*{rMultiple}" readonly>
          </div>

          <div class="col-12">
            <label class="form-label">Mistakes</label>

            <div class="border rounded p-3 bg-light">
              <div class="row g-2" th:if="${!#lists.isEmpty(mistakeTags)}">
                <div class="col-md-4" th:each="m : ${mistakeTags}">
                  <div class="form-check">
                    <input class="form-check-input"
                          type="checkbox"
                          name="mistakeIds"
                          th:id="'mistake_' + ${m.id}"
                          th:value="${m.id}"
                          th:checked="${trade.mistakes != null and #lists.contains(trade.mistakes.![id], m.id)}">
                    <label class="form-check-label"
                          th:for="'mistake_' + ${m.id}"
                          th:text="${m.name}">
                    </label>
                  </div>
                </div>
              </div>

              <div class="text-muted small mb-3" th:if="${#lists.isEmpty(mistakeTags)}">
                No mistake tags available. You can still add custom mistakes below.
              </div>

              <div class="mt-2">
                <label class="form-label mb-1">Other mistakes</label>
                <input class="form-control"
                      type="text"
                      name="customMistakes"
                      placeholder="Example: revenge trade, poor patience, bad news timing">
                <div class="form-text">
                  Separate multiple custom mistakes with commas. New ones will be created automatically.
                </div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <label class="form-label">Note</label>
            <textarea class="form-control" rows="4" th:field="*{note}"></textarea>
          </div>

          <div class="col-12">
            <label class="form-label">Setup Images</label>
            <input class="form-control" type="file" name="setupImages" accept="image/*" multiple>
            <div class="form-text">Upload more setup screenshots to this trade.</div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit">Update Trade</button>
            <a class="btn btn-outline-secondary" th:href="@{/trades/{id}(id=${trade.id})}">Cancel</a>
          </div>

        </div>
      </form>
    </div>
  </div>
</div>

<script>
function parseNum(value) {
    if (value === null || value === undefined || value === '') return null;
    const normalized = String(value).replace(',', '.').trim();
    const num = Number(normalized);
    return Number.isFinite(num) ? num : null;
}

function round2(value) {
    return Math.round(value * 100) / 100;
}

function updateVolumeHint() {
    const symbol = document.getElementById('symbol')?.value;
    const hint = document.getElementById('volumeHint');
    if (!hint) return;

    switch (symbol) {
        case 'BTCUSD':
            hint.textContent = 'Unit: BTC';
            break;
        case 'ETHUSD':
            hint.textContent = 'Unit: ETH';
            break;
        case 'XAUUSD':
        case 'EURUSD':
        case 'GBPUSD':
        case 'USDJPY':
            hint.textContent = 'Unit: lot';
            break;
        default:
            hint.textContent = 'Unit: lot';
            break;
    }
}

function calculateRMultiple(direction, result, entry, sl, exit) {
    if (!direction || entry === null || sl === null || exit === null) {
        return null;
    }

    if (result === 'LOSS') {
        return -1.00;
    }

    let risk = null;
    let reward = null;

    if (direction === 'BUY') {
        risk = entry - sl;
        reward = exit - entry;
    } else if (direction === 'SELL') {
        risk = sl - entry;
        reward = entry - exit;
    }

    if (risk === null || risk <= 0) {
        return null;
    }

    return round2(reward / risk);
}

function calculatePnLBySymbol(symbol, direction, entry, exit, size) {
    if (!symbol || !direction || entry === null || exit === null || size === null || size <= 0) {
        return null;
    }

    let priceDiff = null;

    if (direction === 'BUY') {
        priceDiff = exit - entry;
    } else if (direction === 'SELL') {
        priceDiff = entry - exit;
    } else {
        return null;
    }

    switch (symbol) {
        case 'XAUUSD':
            return round2((priceDiff / 0.01) * 1.0 * size);

        case 'EURUSD':
        case 'GBPUSD':
            return round2((priceDiff / 0.0001) * 10.0 * size);

        case 'USDJPY':
            if (exit <= 0) return null;
            return round2((priceDiff / 0.01) * (1000.0 / exit) * size);

        case 'BTCUSD':
        case 'ETHUSD':
            return round2(priceDiff * size);

        default:
            return null;
    }
}

function calculateLiveMetrics() {
    const symbol = document.getElementById('symbol')?.value;
    const direction = document.getElementById('direction')?.value;
    const result = document.getElementById('result')?.value;

    const entry = parseNum(document.getElementById('entryPrice')?.value);
    const sl = parseNum(document.getElementById('stopLoss')?.value);
    const exit = parseNum(document.getElementById('exitPrice')?.value);
    const size = parseNum(document.getElementById('positionSize')?.value);

    const pnlInput = document.getElementById('pnl');
    const rInput = document.getElementById('rMultiple');

    if (!pnlInput || !rInput) return;

    pnlInput.value = '';
    rInput.value = '';

    const r = calculateRMultiple(direction, result, entry, sl, exit);
    if (r !== null) {
        rInput.value = r.toFixed(2);
    }

    const pnl = calculatePnLBySymbol(symbol, direction, entry, exit, size);
    if (pnl !== null) {
        pnlInput.value = pnl.toFixed(2);
    }
}

document.addEventListener('DOMContentLoaded', function () {
    const watchedIds = [
        'symbol',
        'direction',
        'result',
        'entryPrice',
        'stopLoss',
        'exitPrice',
        'positionSize'
    ];

    watchedIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener('input', function () {
                updateVolumeHint();
                calculateLiveMetrics();
            });
            el.addEventListener('change', function () {
                updateVolumeHint();
                calculateLiveMetrics();
            });
        }
    });

    updateVolumeHint();
    calculateLiveMetrics();
});
</script>

</body>
</html>
