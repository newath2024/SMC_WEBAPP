<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trades</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Trade Journal</h2>
    <a class="btn btn-outline-secondary" href="/">Home</a>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3">Add Trade</h5>

      <form th:action="@{/trades}" method="post" th:object="${trade}">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Account</label>
            <input class="form-control" th:field="*{account}" placeholder="FTMO / The5ers / Audacity / Personal">
            <div class="text-danger small" th:if="${#fields.hasErrors('account')}" th:errors="*{account}"></div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Symbol</label>
            <input class="form-control" th:field="*{symbol}" placeholder="XAUUSD, EURUSD...">
            <div class="text-danger small" th:if="${#fields.hasErrors('symbol')}" th:errors="*{symbol}"></div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Setup</label>
            <input class="form-control" th:field="*{setup}" placeholder="OB / FVG / Sweep...">
            <div class="text-danger small" th:if="${#fields.hasErrors('setup')}" th:errors="*{setup}"></div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Entry</label>
            <input class="form-control" th:field="*{entryPrice}" type="number" step="0.00001">
            <div class="text-danger small" th:if="${#fields.hasErrors('entryPrice')}" th:errors="*{entryPrice}"></div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Stop Loss</label>
            <input class="form-control" th:field="*{stopLoss}" type="number" step="0.00001">
            <div class="text-danger small" th:if="${#fields.hasErrors('stopLoss')}" th:errors="*{stopLoss}"></div>
          </div>

          <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-primary w-100" type="submit">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="card-title mb-3">Trades</h5>

      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
          <tr>
            <th>Account</th>
            <th>Symbol</th>
            <th>Setup</th>
            <th>Entry</th>
            <th>SL</th>
            <th>Created</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="t : ${trades}">
            <td th:text="${t.account}"></td>
            <td th:text="${t.symbol}"></td>
            <td th:text="${t.setup}"></td>
            <td th:text="${t.entryPrice}"></td>
            <td th:text="${t.stopLoss}"></td>
            <td th:text="${t.createdAt}"></td>
          </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>

</body>
</html>
