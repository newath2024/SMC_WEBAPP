<!doctype html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trade Journal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-3">
<h2 class="m-0">Trade Journal</h2>
<a class="btn btn-outline-secondary" href="/">Home</a>
</div>

<div class="card shadow-sm mb-4">
<div class="card-body">

<h5 class="card-title mb-3">Add Trade</h5>

<form th:action="@{/trades}" th:object="${trade}" method="post">

<div class="row g-3">

<div class="col-md-3">
<label class="form-label">Account</label>
<input class="form-control" th:field="*{account}">
</div>

<div class="col-md-3">
<label class="form-label">Symbol</label>
<input class="form-control" th:field="*{symbol}">
</div>

<div class="col-md-3">
<label class="form-label">Direction</label>
<select class="form-select" th:field="*{direction}">
    <option value="">-- Select --</option>
    <option value="BUY">BUY</option>
    <option value="SELL">SELL</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Setup</label>
<input class="form-control" th:field="*{setup}">
</div>

<div class="col-md-3">
<label class="form-label">HTF</label>
<select class="form-select" th:field="*{htf}">
    <option value="">-- Select --</option>
    <option value="1D">1D</option>
    <option value="H4">H4</option>
    <option value="H1">H1</option>
    <option value="M30">M30</option>
    <option value="M15">M15</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">LTF</label>
<select class="form-select" th:field="*{ltf}">
    <option value="">-- Select --</option>
    <option value="M30">M30</option>
    <option value="M15">M15</option>
    <option value="M5">M5</option>
    <option value="M3">M3</option>
    <option value="M1">M1</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Session</label>
<select class="form-select" th:field="*{session}">
    <option value="">-- Select --</option>
    <option value="ASIA">ASIA</option>
    <option value="LONDON">LONDON</option>
    <option value="NEW_YORK">NEW_YORK</option>
    <option value="OTHER">OTHER</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Result</label>
<select class="form-select" th:field="*{result}">
    <option value="">-- Select --</option>
    <option value="WIN">WIN</option>
    <option value="LOSS">LOSS</option>
    <option value="Take partial and then BE">Take partial and then BE</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Entry Time</label>
<input type="datetime-local" class="form-control" th:field="*{entryTime}">
</div>

<div class="col-md-3">
<label class="form-label">Exit Time</label>
<input type="datetime-local" class="form-control" th:field="*{exitTime}">
</div>

<div class="col-md-3">
<label class="form-label">Entry Price</label>
<input type="number" step="0.00001" class="form-control" th:field="*{entryPrice}">
</div>

<div class="col-md-3">
<label class="form-label">Stop Loss</label>
<input type="number" step="0.00001" class="form-control" th:field="*{stopLoss}">
</div>

<div class="col-md-3">
<label class="form-label">Take Profit</label>
<input type="number" step="0.00001" class="form-control" th:field="*{takeProfit}">
</div>

<div class="col-md-3">
<label class="form-label">Exit Price</label>
<input type="number" step="0.00001" class="form-control" th:field="*{exitPrice}">
</div>

<div class="col-md-3">
<label class="form-label">Position Size</label>
<input type="number" step="0.01" class="form-control" th:field="*{positionSize}">
</div>

<div class="col-md-3">
<label class="form-label">PnL</label>
<input type="number" step="0.01" class="form-control" th:field="*{pnl}">
</div>

<div class="col-md-3">
<label class="form-label">R Multiple</label>
<input type="number" step="0.01" class="form-control" th:field="*{rMultiple}">
</div>

<div class="col-md-12">
<label class="form-label">Note</label>
<textarea class="form-control" rows="3" th:field="*{note}"></textarea>
</div>

</div>

<div class="mt-3">
<button class="btn btn-primary">Save Trade</button>
</div>

</form>

</div>
</div>

<div class="card shadow-sm">
<div class="card-body">

<h5 class="card-title mb-3">Trades</h5>

<table class="table table-striped">

<thead>
<tr>
<th>Symbol</th>
<th>Direction</th>
<th>HTF</th>
<th>LTF</th>
<th>Entry</th>
<th>SL</th>
<th>Result</th>
<th>Session</th>
</tr>
</thead>

<tbody>

<tr th:each="t : ${trades}">

<td>
<a th:href="@{/trades/{id}(id=${t.id})}" th:text="${t.symbol}"></a>
</td>

<td th:text="${t.direction}"></td>

<td th:text="${t.htf}"></td>

<td th:text="${t.ltf}"></td>

<td th:text="${t.entryPrice}"></td>

<td th:text="${t.stopLoss}"></td>

<td th:text="${t.result}"></td>

<td th:text="${t.session}"></td>

</tr>

</tbody>

</table>

</div>
</div>

</div>

</body>
</html>
