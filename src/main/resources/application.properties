spring.application.name=demo
server.port=${PORT:8081}
server.tomcat.max-http-form-post-size=30MB

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

billing.webhook.secret=${BILLING_WEBHOOK_SECRET:}
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.trade-chart-model=${OPENAI_TRADE_CHART_MODEL:gpt-4.1}
openai.trade-chart-timeout-seconds=${OPENAI_TRADE_CHART_TIMEOUT_SECONDS:60}
